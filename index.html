<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Summary Workflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0a0c10; --surface:#111318; --border:#1e222b; --accent:#4ade9e;
      --accent-dim:#1a4033; --muted:#3d4455; --text:#e2e8f0; --text-soft:#8892a4;
      --warn:#f59e0b; --err:#f87171; --mono:'Space Mono',monospace;
      --sans:'DM Sans',sans-serif; --radius:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;padding:0 1.5rem 4rem;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;
      background-image:radial-gradient(circle at 20% 20%,rgba(74,222,158,.04) 0%,transparent 60%),
        radial-gradient(circle at 80% 80%,rgba(74,222,158,.03) 0%,transparent 60%);
      pointer-events:none;z-index:0;}

    header{position:relative;z-index:1;width:100%;max-width:860px;padding:3rem 0 2rem;
      border-bottom:1px solid var(--border);margin-bottom:2.5rem;}
    .tag{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
      color:var(--accent);background:var(--accent-dim);padding:.25rem .65rem;border-radius:4px;
      display:inline-block;margin-bottom:1rem;}
    header h1{font-family:var(--mono);font-size:1.75rem;font-weight:700;letter-spacing:-.02em;line-height:1.2;}
    header h1 span{color:var(--accent);}
    header p{margin-top:.6rem;color:var(--text-soft);font-size:.95rem;font-weight:300;
      max-width:520px;line-height:1.6;}

    main{position:relative;z-index:1;width:100%;max-width:860px;
      display:grid;grid-template-columns:1fr 260px;gap:1.5rem;align-items:start;}
    @media(max-width:700px){main{grid-template-columns:1fr;}}

    .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .panel-head{padding:.75rem 1.25rem;border-bottom:1px solid var(--border);font-family:var(--mono);
      font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);
      display:flex;align-items:center;gap:.5rem;}
    .panel-head .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
    .panel-head .dot.active{background:var(--accent);box-shadow:0 0 6px var(--accent);}

    textarea{width:100%;min-height:260px;background:transparent;border:none;outline:none;resize:vertical;
      color:var(--text);font-family:var(--mono);font-size:.82rem;line-height:1.7;padding:1.25rem;
      caret-color:var(--accent);}
    textarea::placeholder{color:var(--muted);}

    .actions{padding:.85rem 1.25rem;border-top:1px solid var(--border);display:flex;
      align-items:center;justify-content:space-between;gap:1rem;}
    .char-count{font-family:var(--mono);font-size:.65rem;color:var(--muted);}

    button{cursor:pointer;border:none;outline:none;font-family:var(--sans);font-weight:600;
      border-radius:7px;transition:all .2s ease;}
    .btn-run{background:var(--accent);color:#0a0c10;padding:.6rem 1.4rem;font-size:.88rem;
      display:flex;align-items:center;gap:.5rem;}
    .btn-run:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn-run:active{transform:translateY(0);}
    .btn-run:disabled{background:var(--muted);color:var(--text-soft);cursor:not-allowed;transform:none;}
    .btn-clear{background:transparent;color:var(--text-soft);padding:.5rem .9rem;font-size:.82rem;
      border:1px solid var(--border);}
    .btn-clear:hover{border-color:var(--muted);color:var(--text);}

    /* Pipeline */
    .pipeline{padding:1.25rem;display:flex;flex-direction:column;gap:.3rem;}
    .node{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:7px;
      border:1px solid transparent;transition:all .3s ease;}
    .node.running{border-color:var(--accent);background:rgba(74,222,158,.05);}
    .node.done{border-color:var(--accent-dim);}
    .node.error{border-color:var(--err);background:rgba(248,113,113,.05);}
    .node-icon{width:28px;height:28px;border-radius:6px;background:var(--border);display:flex;
      align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;transition:all .3s;}
    .node.running .node-icon,.node.done .node-icon{background:var(--accent-dim);}
    .node-info{flex:1;min-width:0;}
    .node-name{font-family:var(--mono);font-size:.68rem;color:var(--text-soft);white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;transition:color .3s;}
    .node.running .node-name,.node.done .node-name{color:var(--text);}
    .node-status{font-size:.6rem;color:var(--muted);font-family:var(--mono);margin-top:1px;}
    .node.running .node-status{color:var(--accent);}
    .node.done .node-status{color:var(--accent);opacity:.6;}
    .node.error .node-status{color:var(--err);}
    .connector{width:1px;height:16px;background:var(--border);margin:0 0 0 24px;transition:background .3s;}
    .connector.lit{background:var(--accent-dim);}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinner{width:12px;height:12px;border:2px solid var(--accent-dim);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}

    /* Output */
    .output-wrap{grid-column:1 / -1;display:none;}
    .output-wrap.visible{display:block;}
    .output-body{padding:1.5rem;font-family:var(--mono);font-size:.8rem;line-height:1.8;
      color:var(--text);white-space:pre-wrap;word-break:break-word;}
    .output-body.error-text{color:var(--err);}
    .btn-copy{background:transparent;color:var(--text-soft);padding:.4rem .85rem;font-size:.75rem;
      border:1px solid var(--border);font-family:var(--mono);letter-spacing:.05em;}
    .btn-copy:hover{border-color:var(--accent);color:var(--accent);}
    .output-actions{padding:.6rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;}

    /* Example pill */
    .examples{font-size:.78rem;color:var(--text-soft);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
    .examples span{color:var(--muted);font-size:.72rem;}
    .example-pill{cursor:pointer;background:var(--border);color:var(--text-soft);padding:.2rem .65rem;
      border-radius:20px;font-size:.72rem;border:none;font-family:var(--sans);transition:all .2s;}
    .example-pill:hover{background:var(--accent-dim);color:var(--accent);}

    /* ── Email confirmation modal ─────────────────────────────── */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
      z-index:100;display:flex;align-items:center;justify-content:center;padding:1.5rem;
      opacity:0;pointer-events:none;transition:opacity .25s;}
    .modal-backdrop.open{opacity:1;pointer-events:all;}

    .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
      width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
      transform:translateY(16px);transition:transform .25s;box-shadow:0 24px 60px rgba(0,0,0,.5);}
    .modal-backdrop.open .modal{transform:translateY(0);}

    .modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-family:var(--mono);font-size:.75rem;letter-spacing:.12em;
      text-transform:uppercase;color:var(--text-soft);}
    .modal-recipient{font-size:.88rem;font-weight:600;color:var(--text);margin-top:.2rem;}

    .email-preview{margin:1.25rem 1.5rem;background:var(--bg);border:1px solid var(--border);
      border-radius:8px;overflow:hidden;}
    .email-meta{padding:.75rem 1rem;border-bottom:1px solid var(--border);
      font-size:.78rem;color:var(--text-soft);}
    .email-meta strong{color:var(--text);}
    .email-body{padding:1rem;font-family:var(--mono);font-size:.76rem;line-height:1.75;
      color:var(--text);white-space:pre-wrap;max-height:220px;overflow-y:auto;}

    .modal-actions{padding:1rem 1.5rem;display:flex;flex-direction:column;gap:.75rem;
      border-top:1px solid var(--border);}
    .modal-btn-row{display:flex;gap:.6rem;}

    .btn-send{background:var(--accent);color:#0a0c10;padding:.65rem 1.2rem;
      font-size:.88rem;font-weight:700;flex:1;}
    .btn-send:hover{filter:brightness(1.1);}
    .btn-revise{background:transparent;color:var(--text);padding:.65rem 1.2rem;
      font-size:.88rem;border:1px solid var(--border);flex:1;}
    .btn-revise:hover{border-color:var(--accent);color:var(--accent);}
    .btn-cancel-email{background:transparent;color:var(--err);padding:.65rem 1.2rem;
      font-size:.88rem;border:1px solid rgba(248,113,113,.3);}
    .btn-cancel-email:hover{background:rgba(248,113,113,.08);}

    .feedback-area{display:none;flex-direction:column;gap:.5rem;}
    .feedback-area.visible{display:flex;}
    .feedback-area textarea{background:var(--bg);border:1px solid var(--border);border-radius:7px;
      color:var(--text);font-family:var(--mono);font-size:.78rem;padding:.75rem;min-height:80px;
      resize:vertical;caret-color:var(--accent);}
    .feedback-area textarea:focus{border-color:var(--accent);outline:none;}
    .btn-submit-feedback{background:var(--accent);color:#0a0c10;padding:.55rem 1.1rem;
      font-size:.82rem;font-weight:700;align-self:flex-end;}

    /* Node detail panel */
    .node{cursor:default;}
    .node.done,.node.error{cursor:pointer;}
    .node.done:hover{background:rgba(74,222,158,.04);}
    .node-detail{overflow:hidden;max-height:0;transition:max-height .3s ease,opacity .3s ease;
      opacity:0;margin:0 0 0 24px;}
    .node-detail.open{max-height:80px;opacity:1;}
    .node-detail-inner{padding:.4rem .6rem .6rem;border-left:2px solid var(--accent-dim);
      margin-left:13px;}
    .node-detail-text{font-family:var(--mono);font-size:.64rem;color:var(--text-soft);
      line-height:1.6;word-break:break-word;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .output-wrap.visible{animation:fadeUp .4s ease;}
  </style>
</head>
<body>

<header>
  <div class="tag">Graphite · Agentic Workflow</div>
  <h1>Meeting <span>Summary</span><br/>Workflow</h1>
  <p>Paste your meeting notes below. The workflow will extract action items, update Google Calendar, email attendees, and generate a formatted summary.</p>
</header>

<main>
  <div class="panel" id="inputPanel">
    <div class="panel-head">
      <div class="dot active" id="inputDot"></div>
      meeting_notes.txt
    </div>
    <textarea id="notes" placeholder="Paste your meeting notes here…&#10;&#10;Example:&#10;Meeting: Product Sync — May 6&#10;Attendees: Sara, Tom, Lina&#10;…"></textarea>
    <div class="actions">
      <div class="examples">
        <span>Try:</span>
        <button class="example-pill" onclick="loadExample()">sample notes</button>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;">
        <span class="char-count" id="charCount">0 chars</span>
        <button class="btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn-run" id="runBtn" onclick="runWorkflow()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <polygon points="2,1 11,6 2,11" fill="currentColor"/>
          </svg>
          Run
        </button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div class="dot" id="pipelineDot"></div>
      pipeline
    </div>
    <div class="pipeline" id="pipeline"></div>
  </div>

  <div class="output-wrap panel" id="outputWrap">
    <div class="panel-head">
      <div class="dot active"></div>
      summary_output
    </div>
    <div class="output-body" id="outputBody"></div>
    <div class="output-actions" id="outputActions" style="display:none;">
      <button class="btn-copy" onclick="copyOutput()">Copy to clipboard</button>
    </div>
  </div>
</main>

<!-- ── Email confirmation modal ──────────────────────────────── -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">Review email before sending</div>
        <div class="modal-recipient" id="modalRecipient"></div>
      </div>
    </div>

    <div class="email-preview">
      <div class="email-meta">
        <strong>To:</strong> <span id="modalTo"></span><br/>
        <strong>Subject:</strong> <span id="modalSubject"></span>
      </div>
      <div class="email-body" id="modalBody"></div>
    </div>

    <div class="modal-actions">
      <div class="modal-btn-row">
        <button class="btn-send"  onclick="confirmEmail('Y')">Send</button>
        <button class="btn-revise" onclick="showFeedback()">Revise</button>
        <button class="btn-cancel-email" onclick="confirmEmail('C')">Cancel</button>
      </div>

      <div class="feedback-area" id="feedbackArea">
        <textarea id="feedbackText" placeholder="What should change in this email?"></textarea>
        <button class="btn-submit-feedback" onclick="submitFeedback()">Submit revision</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Node definitions ─────────────────────────────────────────
const NODES = [
  { id:'ExtractorNode',     icon:'⬡', desc:'Parses meeting notes' },
  { id:'MemoryNode',        icon:'◈', desc:'Enriches with context' },
  { id:'CalendarNode',      icon:'◷', desc:'Creates calendar events' },
  { id:'EmailComposerNode', icon:'◉', desc:'Composes emails' },
  { id:'EmailSenderNode',   icon:'◎', desc:'Sends emails' },
  { id:'FormatterNode',     icon:'◈', desc:'Formats final summary' },
];

let nodeState = {};
let nodeSummaries = {};
let currentSessionId = null;

// ── Pipeline ─────────────────────────────────────────────────
function renderPipeline() {
  const container = document.getElementById('pipeline');
  // Remember which nodes are open before re-render
  const openNodes = new Set(
    Array.from(container.querySelectorAll('.node-detail.open'))
         .map(el => el.dataset.node)
  );
  container.innerHTML = '';
  NODES.forEach((n, i) => {
    const state = nodeState[n.id] || 'pending';
    const summary = nodeSummaries[n.id] || '';

    // Node row
    const node = document.createElement('div');
    node.className = `node ${state}`;
    node.id = `node-${n.id}`;
    let icon = n.icon;
    if (state === 'running') icon = '<div class="spinner"></div>';
    else if (state === 'done') icon = '✓';
    const statusLabel = state==='running'?'running…':state==='done'?'click to expand':state==='error'?'error':n.desc;
    node.innerHTML = `
      <div class="node-icon">${icon}</div>
      <div class="node-info">
        <div class="node-name">${n.id}</div>
        <div class="node-status">${statusLabel}</div>
      </div>`;
    if (state === 'done' || state === 'error') {
      node.addEventListener('click', () => toggleNodeDetail(n.id));
    }
    container.appendChild(node);

    // Detail panel (shown on click)
    const detail = document.createElement('div');
    detail.className = 'node-detail' + (openNodes.has(n.id) ? ' open' : '');
    detail.dataset.node = n.id;
    detail.id = `detail-${n.id}`;
    detail.innerHTML = `<div class="node-detail-inner">
      <div class="node-detail-text">${summary || 'No details available yet.'}</div>
    </div>`;
    container.appendChild(detail);

    if (i < NODES.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector' + (state === 'done' ? ' lit' : '');
      container.appendChild(conn);
    }
  });
  document.getElementById('pipelineDot').classList.toggle('active',
    Object.values(nodeState).includes('running'));
}

function toggleNodeDetail(nodeId) {
  const detail = document.getElementById(`detail-${nodeId}`);
  if (detail) detail.classList.toggle('open');
}

function resetNodes() {
  nodeState = {};
  nodeSummaries = {};
  NODES.forEach(n => nodeState[n.id] = 'pending');
  renderPipeline();
}

// ── Char counter ──────────────────────────────────────────────
const notesEl = document.getElementById('notes');
notesEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = notesEl.value.length + ' chars';
});

// ── Example ───────────────────────────────────────────────────
const SAMPLE = `Meeting: Product Weekly Sync — May 6, 2026
Attendees: Sara (CEO), Tom (Dev), Lina (Design)
Absent: Marwa (QA)

We decided to push the beta launch from May 15th to May 22nd because the onboarding flow needs more polish.

Action items:
- Tom: finish onboarding flow by May 10th
- Lina: send final mockups to Tom by May 8th
- Sara: reach out to 10 beta users this week
- Marwa: review the security audit by May 12th

Next meeting: Backend Call on May 10th at 14:00 on Zoom.`;

function loadExample() {
  if (notesEl.value.trim() === SAMPLE.trim()) {
    notesEl.value = '';
  } else {
    notesEl.value = SAMPLE;
  }
  notesEl.dispatchEvent(new Event('input'));
}

// ── Clear ─────────────────────────────────────────────────────
function clearAll() {
  notesEl.value = '';
  notesEl.dispatchEvent(new Event('input'));
  document.getElementById('outputWrap').classList.remove('visible');
  document.getElementById('outputActions').style.display = 'none';
  resetNodes();
  closeModal();
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(data) {
  document.getElementById('modalRecipient').textContent =
    `${data.name}  ·  ${data.recipient_type}`;
  document.getElementById('modalTo').textContent = data.name;
  document.getElementById('modalSubject').textContent = data.subject;
  document.getElementById('modalBody').textContent = data.body;
  document.getElementById('feedbackArea').classList.remove('visible');
  document.getElementById('feedbackText').value = '';
  document.getElementById('confirmModal').classList.add('open');
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('open');
}

function showFeedback() {
  document.getElementById('feedbackArea').classList.add('visible');
  document.getElementById('feedbackText').focus();
}

async function confirmEmail(answer, feedback = '') {
  if (!currentSessionId) return;
  closeModal();
  try {
    await fetch(`/confirm/${currentSessionId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answer, feedback }),
    });
  } catch (e) {
    console.error('Confirm failed:', e);
  }
}

function submitFeedback() {
  const feedback = document.getElementById('feedbackText').value.trim();
  if (!feedback) {
    document.getElementById('feedbackText').focus();
    return;
  }
  confirmEmail('N', feedback);
}

// Close modal on backdrop click
document.getElementById('confirmModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) confirmEmail('C');
});

// ── Run workflow ──────────────────────────────────────────────
async function runWorkflow() {
  const notes = notesEl.value.trim();
  if (!notes) { notesEl.focus(); return; }

  const runBtn       = document.getElementById('runBtn');
  const outputWrap   = document.getElementById('outputWrap');
  const outputBody   = document.getElementById('outputBody');
  const outputActions= document.getElementById('outputActions');

  runBtn.disabled = true;
  runBtn.textContent = 'Running…';
  outputBody.className = 'output-body';
  outputBody.textContent = '';
  outputWrap.classList.add('visible');
  outputActions.style.display = 'none';
  currentSessionId = null;
  resetNodes();

  try {
    const response = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ meeting_notes: notes }),
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.detail || response.statusText);
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        let msg;
        try { msg = JSON.parse(raw); } catch { continue; }

        if (msg.type === 'session') {
          currentSessionId = msg.session_id;

        } else if (msg.type === 'confirm_email') {
          openModal(msg);

        } else if (msg.type === 'result') {
          outputBody.textContent = msg.content;
          outputActions.style.display = 'flex';
          NODES.forEach(n => { if (nodeState[n.id] !== 'done') nodeState[n.id] = 'done'; });
          renderPipeline();
          closeModal();

        } else if (msg.type === 'error') {
          outputBody.className = 'output-body error-text';
          outputBody.textContent = '⚠ Error: ' + msg.content;
          NODES.forEach(n => { if (nodeState[n.id] === 'running') nodeState[n.id] = 'error'; });
          renderPipeline();
          closeModal();

        } else if (msg.type === 'node_summary') {
          nodeSummaries[msg.node] = msg.summary;
          renderPipeline();
        } else if (msg.node && msg.status) {
          nodeState[msg.node] = msg.status;
          renderPipeline();
        }
      }
    }
  } catch (err) {
    document.getElementById('outputBody').className = 'output-body error-text';
    document.getElementById('outputBody').textContent = '⚠ ' + err.message;
  } finally {
    runBtn.disabled = false;
    runBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polygon points="2,1 11,6 2,11" fill="currentColor"/></svg> Run`;
  }
}

function copyOutput() {
  const text = document.getElementById('outputBody').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
  });
}

resetNodes();
</script>
</body>
</html>
