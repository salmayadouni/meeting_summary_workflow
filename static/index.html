<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meeting Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e4e2db;--border2:#ccc9bf;
  --text:#1a1916;--soft:#6b6860;--muted:#aaa89f;
  --green:#16a35a;--green-bg:#e8f7ef;--green-dim:#b6e8ce;
  --amber:#d97706;--amber-bg:#fef9ee;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --red:#dc2626;--red-bg:#fee2e2;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-size:14px;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);
  display:flex;flex-direction:column;align-items:center;}

/* ── Layout ── */
.page{width:100%;max-width:760px;height:100vh;display:flex;flex-direction:column;padding:0 1rem;}

/* ── Header ── */
.header{padding:1.25rem 0 .75rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:28px;height:28px;background:var(--text);border-radius:7px;
  display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.logo-name{font-size:.82rem;font-weight:500;}
.logo-sub{font-size:.68rem;color:var(--muted);}
.status-pill{font-family:var(--mono);font-size:.62rem;padding:.25rem .65rem;
  border-radius:20px;background:var(--surface);border:1px solid var(--border);
  color:var(--muted);display:flex;align-items:center;gap:.35rem;}
.status-pill.running{background:var(--green-bg);border-color:var(--green-dim);color:var(--green);}
.s-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.s-dot.anim{animation:blink .9s ease infinite;}

/* ── Messages ── */
.messages{flex:1;overflow-y:auto;padding:1.25rem 0;display:flex;flex-direction:column;gap:.75rem;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── Bubbles ── */
.bubble{display:flex;gap:.6rem;align-items:flex-start;}
.bubble.user{flex-direction:row-reverse;}
.avatar{width:26px;height:26px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.6rem;
  font-weight:600;font-family:var(--mono);}
.avatar.user-av{background:var(--text);color:#fff;}
.avatar.agent-av{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim);}
.msg-body{max-width:88%;display:flex;flex-direction:column;gap:.25rem;}
.bubble.user .msg-body{align-items:flex-end;}

.msg-text{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:.65rem .9rem;font-size:.83rem;line-height:1.65;color:var(--text);}
.bubble.user .msg-text{background:var(--text);color:#fff;border-color:var(--text);}
.msg-time{font-family:var(--mono);font-size:.58rem;color:var(--muted);padding:0 .3rem;}

/* ── Tool card ── */
.tool-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:visible;
  font-size:.78rem;
  max-width:88%;
  margin-left:34px;
}

.tool-header{padding:.5rem .8rem;display:flex;align-items:center;gap:.5rem;cursor:pointer;
  user-select:none;}
.tool-header:hover{background:var(--bg);}
.tool-icon{font-size:.85rem;}
.tool-name{font-family:var(--mono);font-size:.68rem;font-weight:500;color:var(--soft);}
.tool-status{margin-left:auto;font-family:var(--mono);font-size:.6rem;}
.tool-status.pending{color:var(--amber);}
.tool-status.done{color:var(--green);}
.tool-status.error{color:var(--red);}
.tool-body{
  border-top:1px solid var(--border);
  padding:.6rem .8rem;
  display:none;
  flex-direction:column;
  gap:.35rem;
}

.tool-body.open{
  display:flex;
}

.tool-row{
  display:block;
}
.tool-key{
  display:block;
  font-family:var(--mono);
  font-size:.62rem;
  color:var(--muted);
  margin-bottom:.15rem;
}
.tool-val{
  display:block;
  font-family:var(--mono);
  font-size:.65rem;
  color:var(--text);
  white-space:pre-wrap;
  word-break:break-word;
  overflow-wrap:anywhere;
}
.tool-divider{height:1px;background:var(--border);margin:.2rem 0;}
.tool-result-label{font-family:var(--mono);font-size:.6rem;color:var(--green);font-weight:500;}

/* ── Thinking ── */
.thinking{display:flex;align-items:center;gap:.4rem;margin-left:34px;
  font-size:.75rem;color:var(--muted);font-style:italic;padding:.1rem 0;}
@keyframes spin{to{transform:rotate(360deg)}}
.thinking-spin{width:11px;height:11px;border:1.5px solid var(--border2);
  border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}

/* ── Final summary ── */
.summary-card{background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;max-width:100%;margin-left:34px;}
.summary-head{padding:.6rem .9rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.summary-label{font-family:var(--mono);font-size:.62rem;color:var(--muted);
  letter-spacing:.08em;text-transform:uppercase;}
.summary-body{padding:1rem .9rem;font-family:var(--mono);font-size:.77rem;
  line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.copy-btn{font-family:var(--mono);font-size:.6rem;color:var(--soft);
  background:transparent;border:1px solid var(--border);border-radius:5px;
  padding:.2rem .55rem;cursor:pointer;}
.copy-btn:hover{border-color:var(--green);color:var(--green);}

/* ── Input area ── */
.input-area{padding:.75rem 0 1rem;border-top:1px solid var(--border);flex-shrink:0;}
.input-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;transition:border-color .15s;}
.input-box:focus-within{border-color:var(--border2);}
textarea{width:100%;background:transparent;border:none;outline:none;resize:none;
  color:var(--text);font-family:var(--mono);font-size:.78rem;line-height:1.7;
  padding:.9rem 1rem;min-height:90px;max-height:220px;caret-color:var(--green);}
textarea::placeholder{color:var(--muted);}
.input-bar{padding:.5rem .75rem;display:flex;align-items:center;
  justify-content:space-between;border-top:1px solid var(--border);}
.left-btns{display:flex;gap:.4rem;align-items:center;}
.sample-btn{font-family:var(--mono);font-size:.62rem;color:var(--soft);
  background:transparent;border:1px solid var(--border);border-radius:6px;
  padding:.25rem .6rem;cursor:pointer;transition:all .15s;}
.sample-btn:hover{border-color:var(--border2);color:var(--text);}
.clear-btn{font-family:var(--sans);font-size:.75rem;color:var(--soft);
  background:transparent;border:1px solid var(--border);border-radius:7px;
  padding:.35rem .7rem;cursor:pointer;}
.clear-btn:hover{border-color:var(--border2);color:var(--text);}
.run-btn{background:var(--text);color:#fff;font-family:var(--sans);font-size:.8rem;
  font-weight:500;padding:.45rem 1.1rem;border-radius:8px;border:none;cursor:pointer;
  display:flex;align-items:center;gap:.4rem;transition:all .15s;}
.run-btn:hover{background:#000;}
.run-btn:disabled{background:var(--border2);color:var(--soft);cursor:not-allowed;}
.char-count{font-family:var(--mono);font-size:.6rem;color:var(--muted);}

/* ── Tool icons map ── */
/* handled in JS */

/* ── Modal ── */
.backdrop{position:fixed;inset:0;background:rgba(26,25,22,.5);backdrop-filter:blur(3px);
  z-index:100;display:flex;align-items:center;justify-content:center;padding:1.5rem;
  opacity:0;pointer-events:none;transition:opacity .2s;}
.backdrop.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:500px;max-height:88vh;overflow-y:auto;
  transform:translateY(10px);transition:transform .2s;
  box-shadow:0 20px 50px rgba(0,0,0,.1);}
.backdrop.open .modal{transform:translateY(0);}
.modal-head{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);}
.modal-tag{font-family:var(--mono);font-size:.6rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;}
.modal-who{font-size:.88rem;font-weight:500;}
.email-box{margin:.9rem 1.1rem;background:var(--bg);border:1px solid var(--border);border-radius:9px;}
.email-meta{padding:.6rem .9rem;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:.68rem;color:var(--soft);}
.email-meta b{color:var(--text);}
.email-text{padding:.8rem .9rem;font-family:var(--mono);font-size:.73rem;
  line-height:1.75;white-space:pre-wrap;max-height:180px;overflow-y:auto;}
.modal-foot{padding:.75rem 1.1rem;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:.6rem;}
.modal-btns{display:flex;gap:.5rem;}
.btn-send{flex:1;background:var(--text);color:#fff;padding:.55rem;
  border:none;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;}
.btn-send:hover{background:#000;}
.btn-revise{flex:1;background:transparent;color:var(--text);padding:.55rem;
  border:1px solid var(--border);border-radius:8px;font-size:.8rem;cursor:pointer;}
.btn-revise:hover{border-color:var(--border2);}
.btn-cancel-m{background:transparent;color:var(--red);padding:.55rem .85rem;
  border:1px solid #fca5a5;border-radius:8px;font-size:.8rem;cursor:pointer;}
.btn-cancel-m:hover{background:var(--red-bg);}
.fb-area{display:none;flex-direction:column;gap:.45rem;}
.fb-area.show{display:flex;}
.fb-area textarea{min-height:65px;padding:.65rem;font-family:var(--mono);
  font-size:.72rem;border:1px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--text);resize:vertical;outline:none;}
.fb-area textarea:focus{border-color:var(--green);}
.btn-fb{align-self:flex-end;background:var(--text);color:#fff;padding:.4rem .9rem;
  border:none;border-radius:7px;font-size:.75rem;font-weight:500;cursor:pointer;}
.btn-fb:hover{background:#000;}
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 14 14"><path d="M1 7h12M7 1l5 6-5 6"/></svg>
      </div>
      <div>
        <div class="logo-name">meeting workflow</div>
        <div class="logo-sub">graphite · llm agent</div>
      </div>
    </div>
    <div class="status-pill" id="pill">
      <div class="s-dot" id="pilldot"></div>
      <span id="pilltext">idle</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="notes" placeholder="Paste your meeting notes here…" spellcheck="false"></textarea>
      <div class="input-bar">
        <div class="left-btns">
          <button class="sample-btn" id="sampleBtn" onclick="toggleSample()">load sample</button>
          <span class="char-count" id="charCount">0 chars</span>
        </div>
        <div style="display:flex;gap:.4rem;">
          <button class="clear-btn" onclick="clearAll()">Clear</button>
          <button class="run-btn" id="runBtn" onclick="run()">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><polygon points="0,0 9,4.5 0,9"/></svg>
            Run
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Email confirmation modal -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-tag">Review before sending</div>
      <div class="modal-who" id="mWho"></div>
    </div>
    <div class="email-box">
      <div class="email-meta"><b>To:</b> <span id="mTo"></span> &nbsp;·&nbsp; <b>Subject:</b> <span id="mSubj"></span></div>
      <div class="email-text" id="mBody"></div>
    </div>
    <div class="modal-foot">
      <div class="modal-btns">
        <button class="btn-send"  onclick="confirm_('Y')">Send</button>
        <button class="btn-revise" onclick="showFb()">Revise</button>
        <button class="btn-cancel-m" onclick="confirm_('C')">Cancel</button>
      </div>
      <div class="fb-area" id="fbArea">
        <textarea id="fbText" placeholder="What should change?"></textarea>
        <button class="btn-fb" onclick="submitFb()">Apply revision</button>
      </div>
    </div>
  </div>
</div>

<script>
const SAMPLE=`Meeting: Tech Sprint Planning \u2014 May 6, 2026
Attendees: Maryem (PM), Imane (Dev)
Absent: Reda (Backend), Marwa (Docs)

We agreed to split the backend pipeline into two separate services.
We also decided to freeze any new feature requests until the current sprint closes.

Action items:
- Reda: refactor the data ingestion module by May 9th
- Marwa: update API documentation by May 10th
- Maryem: prepare the sprint review presentation by May 8th
- Imane: run integration tests and share report by May 9th

We cancelled the Architecture Review session.
Next meeting: Sprint Review on May 12th at 10:00 on Zoom.`;

const TOOL_ICONS = {
  check_email_sent:'🧠',
  send_email_with_confirmation:'✉️',
  record_email_sent:'📝',
  create_calendar_event:'📅',
  delete_calendar_event:'🗑️',
  format_summary:'📄',
};

let sessionId = null;
let isRunning = false;

/* ── Char count ── */
const notesEl = document.getElementById('notes');
notesEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = notesEl.value.length + ' chars';
});

/* ── Sample toggle ── */
function toggleSample() {
  const btn = document.getElementById('sampleBtn');
  if (notesEl.value.trim() === SAMPLE.trim()) {
    notesEl.value = ''; btn.textContent = 'load sample';
  } else {
    notesEl.value = SAMPLE; btn.textContent = 'clear sample';
  }
  notesEl.dispatchEvent(new Event('input'));
}

/* ── Clear ── */
function clearAll() {
  if (isRunning) return;
  notesEl.value = '';
  notesEl.dispatchEvent(new Event('input'));
  document.getElementById('sampleBtn').textContent = 'load sample';
  document.getElementById('messages').innerHTML = '';
  setStatus('idle', false);
}

/* ── Status pill ── */
function setStatus(text, running) {
  document.getElementById('pilltext').textContent = text;
  document.getElementById('pill').className = 'status-pill' + (running ? ' running' : '');
  document.getElementById('pilldot').className = 's-dot' + (running ? ' anim' : '');
}

/* ── Message helpers ── */
function addUserMsg(text) {
  const msgs = document.getElementById('messages');
  const preview = text.length > 200 ? text.slice(0, 200) + '…' : text;
  msgs.innerHTML += `
    <div class="bubble user">
      <div class="avatar user-av">You</div>
      <div class="msg-body">
        <div class="msg-text" style="font-family:var(--mono);font-size:.74rem;line-height:1.7;">${preview.replace(/</g,'&lt;')}</div>
      </div>
    </div>`;
  scrollDown();
}

function addThinking(text) {
  const msgs = document.getElementById('messages');
  msgs.innerHTML += `<div class="thinking"><div class="thinking-spin"></div><span>${text}</span></div>`;
  scrollDown();
}

function removeLastThinking() {
  const msgs = document.getElementById('messages');
  const last = msgs.querySelector('.thinking:last-child');
  if (last) last.remove();
}

function addAgentMsg(text) {
  const msgs = document.getElementById('messages');
  msgs.innerHTML += `
    <div class="bubble">
      <div class="avatar agent-av">AI</div>
      <div class="msg-body">
        <div class="msg-text">${text.replace(/</g,'&lt;').replace(/\n/g,'<br/>')}</div>
      </div>
    </div>`;
  scrollDown();
}

function addToolCard(tool, args, resultObj) {
  const msgs = document.getElementById('messages');
  const icon = TOOL_ICONS[tool] || '🔧';
  const id = 'tc_' + Math.random().toString(36).slice(2);
  const argsHtml = Object.entries(args).map(([k,v]) => {
    let display = typeof v === 'object' ? JSON.stringify(v) : String(v);
    return `<div class="tool-row"><span class="tool-key">${k}</span><span class="tool-val">${display.replace(/</g,'&lt;')}</span></div>`;
  }).join('');

  const resultHtml = resultObj
    ? (() => {
        const entries = typeof resultObj === 'object' && !Array.isArray(resultObj)
          ? Object.entries(resultObj)
          : [['result', JSON.stringify(resultObj)]];
        return '<div class="tool-divider"></div>' +
          '<div class="tool-result-label">result</div>' +
          entries.map(([k,v]) => {
            let d = typeof v === 'object' ? JSON.stringify(v) : String(v);
            return `<div class="tool-row"><span class="tool-key">${k}</span><span class="tool-val">${d.replace(/</g,'&lt;')}</span></div>`;
          }).join('');
      })()
    : '';

  const status = resultObj ? 'done' : 'pending';
  const statusLabel = resultObj ? '✓ done' : '⟳ running';

  msgs.innerHTML += `
    <div class="tool-card" id="${id}">
      <div class="tool-header" onclick="toggleTool('${id}')">
        <span class="tool-icon">${icon}</span>
        <span class="tool-name">${tool}</span>
        <span class="tool-status ${status}">${statusLabel}</span>
      </div>
      <div class="tool-body" id="${id}_body">
        ${argsHtml}
        ${resultHtml}
      </div>
    </div>`;
  scrollDown();
}

function updateToolCard(tool, result) {
  // Find the last pending card for this tool and update it
  const msgs = document.getElementById('messages');
  const cards = msgs.querySelectorAll('.tool-card');
  for (let i = cards.length - 1; i >= 0; i--) {
    const nameEl = cards[i].querySelector('.tool-name');
    const statusEl = cards[i].querySelector('.tool-status');
    if (nameEl && nameEl.textContent === tool && statusEl.classList.contains('pending')) {
      statusEl.textContent = '✓ done';
      statusEl.className = 'tool-status done';
      const body = cards[i].querySelector('.tool-body');
      const div = document.createElement('div');
      div.innerHTML = '<div class="tool-divider"></div><div class="tool-result-label">result</div>';
      const entries = typeof result === 'object' && !Array.isArray(result)
        ? Object.entries(result)
        : [['result', JSON.stringify(result)]];
      entries.forEach(([k,v]) => {
        let d = typeof v === 'object' ? JSON.stringify(v) : String(v);
        if (d.length > 80) d = d.slice(0,80)+'…';
        div.innerHTML += `<div class="tool-row"><span class="tool-key">${k}</span><span class="tool-val">${d.replace(/</g,'&lt;')}</span></div>`;
      });
      body.appendChild(div);
      break;
    }
  }
}

function toggleTool(id) {
  document.getElementById(id+'_body').classList.toggle('open');
}

function addSummary(text) {
  const msgs = document.getElementById('messages');
  const id = 'sum_' + Math.random().toString(36).slice(2);
  msgs.innerHTML += `
    <div class="summary-card">
      <div class="summary-head">
        <span class="summary-label">📄 meeting summary</span>
        <button class="copy-btn" onclick="copyText('${id}')">copy</button>
      </div>
      <div class="summary-body" id="${id}">${text.replace(/</g,'&lt;')}</div>
    </div>`;
  scrollDown();
}

function copyText(id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    document.querySelectorAll('.copy-btn').forEach(b => {
      if (b.getAttribute('onclick') === `copyText('${id}')`) {
        b.textContent = 'copied!';
        setTimeout(() => b.textContent = 'copy', 2000);
      }
    });
  });
}

function scrollDown() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

/* ── Modal ── */
function openModal(d) {
  document.getElementById('mWho').textContent = d.name + ' · ' + d.recipient_type;
  document.getElementById('mTo').textContent = d.name;
  document.getElementById('mSubj').textContent = d.subject;
  document.getElementById('mBody').textContent = d.body;
  document.getElementById('fbArea').className = 'fb-area';
  document.getElementById('fbText').value = '';
  document.getElementById('backdrop').classList.add('open');
}
function closeModal() { document.getElementById('backdrop').classList.remove('open'); }
function showFb() {
  document.getElementById('fbArea').className = 'fb-area show';
  document.getElementById('fbText').focus();
}
async function confirm_(answer, feedback = '') {
  if (!sessionId) return;
  closeModal();
  await fetch(`/confirm/${sessionId}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({answer, feedback}),
  });
}
function submitFb() {
  const fb = document.getElementById('fbText').value.trim();
  if (!fb) { document.getElementById('fbText').focus(); return; }
  confirm_('N', fb);
}
document.getElementById('backdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) confirm_('C');
});

/* ── Run ── */
async function run() {
  const notes = notesEl.value.trim();
  if (!notes || isRunning) return;

  isRunning = true;
  sessionId = null;
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<div style="width:9px;height:9px;border:1.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite"></div> Running';

  addUserMsg(notes);
  setStatus('running…', true);
  addThinking('Agent thinking…');

  try {
    const res = await fetch('/run', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({meeting_notes: notes}),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim(); if (!raw) continue;
        let msg; try { msg = JSON.parse(raw); } catch { continue; }

        if (msg.type === 'session') {
          sessionId = msg.session_id;

        } else if (msg.type === 'agent_thinking') {
          removeLastThinking();
          addAgentMsg(msg.content);
          addThinking('Working…');

        } else if (msg.type === 'tool_call') {
          removeLastThinking();
          addToolCard(msg.tool, msg.args, null);
          setStatus(msg.tool.replace(/_/g,' '), true);
          addThinking('Working…');

        } else if (msg.type === 'tool_result') {
          removeLastThinking();
          updateToolCard(msg.tool, msg.result);
          addThinking('Working…');

        } else if (msg.type === 'confirm_email') {
          removeLastThinking();
          openModal(msg);
          addThinking('Waiting for your confirmation…');

        } else if (msg.type === 'result') {
          removeLastThinking();
          addSummary(msg.content);

        } else if (msg.type === 'error') {
          removeLastThinking();
          addAgentMsg('⚠ Error: ' + msg.content);
          setStatus('error', false);

        } else if (msg.type === 'done') {
          removeLastThinking();
          setStatus('done', false);
        }
      }
    }
  } catch(e) {
    removeLastThinking();
    addAgentMsg('⚠ ' + e.message);
    setStatus('error', false);
  } finally {
    isRunning = false;
    btn.disabled = false;
    btn.innerHTML = '<svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><polygon points="0,0 9,4.5 0,9"/></svg> Run';
  }
}
</script>
</body>
</html>
